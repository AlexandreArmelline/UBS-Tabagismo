<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Paciente - UBS Ipiranga</title>
    
    <!-- 1 BIBLIOTECAS E DEPENDÊNCIAS -->
    <!-- 1.1 Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- 1.2 Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- 1.3 CSS Personalizado -->
    <link rel="stylesheet" href="css/estilo.css">
    
</head>
<body class="bg-light">

    <!-- 2 BARRA DE NAVEGAÇÃO SUPERIOR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            
            <!-- 2.1 Logo e nome do sistema -->
            <a class="navbar-brand fw-bold" href="menu.html">
                <i class="bi bi-hospital me-2"></i>UBS Ipiranga
            </a>
            
            <!-- 2.2 Botão Voltar -->
            <a href="menu.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Voltar ao Menu
            </a>
            
        </div>
    </nav>

    <!-- 3 CONTAINER PRINCIPAL -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <!-- 3.1 CABEÇALHO DA PÁGINA -->
                <div class="text-center mb-4">
                    <div class="icone-ferramenta bg-success bg-opacity-10 rounded-circle mx-auto mb-3" style="width: 70px; height: 70px;">
                        <i class="bi bi-person-plus-fill text-success" style="font-size: 2rem;"></i>
                    </div>
                    <h3 class="fw-bold text-success">Adicionar Paciente</h3>
                    <p class="text-muted small">Preencha os dados do novo paciente do Grupo de Tabagismo</p>
                </div>
                
                <!-- 3.2 CARD DO FORMULÁRIO -->
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">
                        
                        <!-- 3.2.1 Formulário -->
                        <form id="formAddPaciente" novalidate>
                            
                            <!-- 3.2.2 Campo Nome Completo -->
                            <div class="mb-3">
                                <label for="nomeCompleto" class="form-label fw-semibold">
                                    <i class="bi bi-person-fill me-1 text-success"></i>Nome Completo
                                </label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="nomeCompleto" 
                                    placeholder="Digite o nome completo do paciente"
                                    required
                                    maxlength="100"
                                >
                            </div>
                            
                            <!-- 3.2.3 Linha CPF e RG -->
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label for="cpf" class="form-label fw-semibold">
                                        <i class="bi bi-person-vcard-fill me-1 text-success"></i>CPF
                                    </label>
                                    <input 
                                        type="text" 
                                        class="form-control" 
                                        id="cpf" 
                                        placeholder="000.000.000-00"
                                        required
                                        maxlength="14"
                                    >
                                </div>
                                <div class="col-md-6">
                                    <label for="rg" class="form-label fw-semibold">
                                        <i class="bi bi-person-vcard me-1 text-success"></i>RG
                                    </label>
                                    <input 
                                        type="text" 
                                        class="form-control" 
                                        id="rg" 
                                        placeholder="Digite o RG"
                                        maxlength="20"
                                    >
                                </div>
                            </div>
                            
                            <!-- 3.2.4 Campo Data de Nascimento -->
                            <div class="mb-3">
                                <label for="dataNascimento" class="form-label fw-semibold">
                                    <i class="bi bi-calendar-fill me-1 text-success"></i>Data de Nascimento
                                </label>
                                <input 
                                    type="date" 
                                    class="form-control" 
                                    id="dataNascimento" 
                                    required
                                >
                            </div>
                            
                            <!-- 3.2.5 Campo Telefone -->
                            <div class="mb-3">
                                <label for="telefone" class="form-label fw-semibold">
                                    <i class="bi bi-telephone-fill me-1 text-success"></i>Telefone
                                </label>
                                <input 
                                    type="tel" 
                                    class="form-control" 
                                    id="telefone" 
                                    placeholder="(11) 99999-9999"
                                    maxlength="15"
                                >
                            </div>
                            
                            <!-- 3.2.6 Campo Endereço -->
                            <div class="mb-3">
                                <label for="endereco" class="form-label fw-semibold">
                                    <i class="bi bi-geo-alt-fill me-1 text-success"></i>Endereço
                                </label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="endereco" 
                                    placeholder="Digite o endereço"
                                    maxlength="200"
                                >
                            </div>
                            
                            <!-- 3.2.7 Linha Cidade e UF -->
                            <div class="row g-3 mb-3">
                                <div class="col-md-8">
                                    <label for="cidade" class="form-label fw-semibold">
                                        <i class="bi bi-building-fill me-1 text-success"></i>Cidade
                                    </label>
                                    <input 
                                        type="text" 
                                        class="form-control" 
                                        id="cidade" 
                                        placeholder="Digite a cidade"
                                        maxlength="100"
                                    >
                                </div>
                                <div class="col-md-4">
                                    <label for="uf" class="form-label fw-semibold">
                                        <i class="bi bi-map-fill me-1 text-success"></i>UF
                                    </label>
                                    <select class="form-select" id="uf">
                                        <option value="" selected disabled>Selecione</option>
                                        <option value="SP">SP</option>
                                        <option value="RJ">RJ</option>
                                        <option value="MG">MG</option>
                                        <option value="ES">ES</option>
                                        <option value="PR">PR</option>
                                        <option value="SC">SC</option>
                                        <option value="RS">RS</option>
                                        <option value="DF">DF</option>
                                        <option value="GO">GO</option>
                                        <option value="MT">MT</option>
                                        <option value="MS">MS</option>
                                        <option value="BA">BA</option>
                                        <option value="SE">SE</option>
                                        <option value="AL">AL</option>
                                        <option value="PE">PE</option>
                                        <option value="PB">PB</option>
                                        <option value="RN">RN</option>
                                        <option value="CE">CE</option>
                                        <option value="PI">PI</option>
                                        <option value="MA">MA</option>
                                        <option value="PA">PA</option>
                                        <option value="AP">AP</option>
                                        <option value="AM">AM</option>
                                        <option value="RR">RR</option>
                                        <option value="AC">AC</option>
                                        <option value="RO">RO</option>
                                        <option value="TO">TO</option>
                                    </select>
                                </div>
                            </div>
                            
                            <!-- 3.2.8 Campo Data de Adesão -->
                            <div class="mb-3">
                                <label for="dataAdesao" class="form-label fw-semibold">
                                    <i class="bi bi-calendar-check-fill me-1 text-success"></i>Data de Adesão ao Grupo
                                </label>
                                <input 
                                    type="date" 
                                    class="form-control" 
                                    id="dataAdesao" 
                                    required
                                >
                            </div>
                            
                            <!-- 3.2.9 Campo Observações -->
                            <div class="mb-4">
                                <label for="observacoes" class="form-label fw-semibold">
                                    <i class="bi bi-chat-left-text-fill me-1 text-success"></i>Observações
                                </label>
                                <textarea 
                                    class="form-control" 
                                    id="observacoes" 
                                    rows="3" 
                                    placeholder="Observações relevantes sobre o paciente (opcional)"
                                    maxlength="500"
                                ></textarea>
                            </div>
                            
                            <!-- 3.2.10 Botões de Ação -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="button" class="btn btn-outline-secondary" onclick="window.location.href='menu.html'">
                                    <i class="bi bi-x-circle me-1"></i>Cancelar
                                </button>
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-person-plus-fill me-1"></i>Adicionar Paciente
                                </button>
                            </div>
                            
                        </form>
                        
                    </div>
                </div>
                
                <!-- 3.3 MENSAGEM DE FEEDBACK -->
                <div id="msgFeedback" class="alert mt-3 d-none text-center" role="alert"></div>
                
            </div>
        </div>
    </div>

        <!-- 4 SCRIPTS -->
    <!-- 4.1 Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 4.2 App JS (define API_URL e funções globais) -->
    <script src="js/app.js"></script>
    
    <!-- 4.3 Paciente JS -->
    <script src="js/paciente.js"></script>

</body>
</html>
