<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBS Ipiranga - Grupo de Tabagismo</title>
    
    <!-- 1 BIBLIOTECAS E DEPENDÊNCIAS. -->
    <!-- 1.1 Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- 1.2 Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- 1.3 CSS Personalizado -->
    <link rel="stylesheet" href="css/estilo.css">
    
</head>
<body class="bg-light">

    <!-- 2 CONTAINER PRINCIPAL -->
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-md-6 col-lg-5">
                
                <!-- 3 CARD DE LOGIN -->
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">
                        
                        <!-- 3.1 CABEÇALHO DO CARD -->
                        <div class="text-center mb-4">
                            <i class="bi bi-hospital text-success" style="font-size: 3rem;"></i>
                            <h3 class="mt-3 fw-bold text-success">UBS Ipiranga</h3>
                            <p class="text-muted small">Grupo de Tabagismo - Acesso ao Sistema</p>
                        </div>
                        
                        <!-- 3.2 FORMULÁRIO DE LOGIN -->
                        <form id="formLogin" novalidate>
                            
                            <!-- 3.2.1 Campo Usuário/CPF -->
                            <div class="mb-3">
                                <label for="inputUsuario" class="form-label fw-semibold">
                                    <i class="bi bi-person-fill me-1"></i>Usuário ou CPF
                                </label>
                                <input 
                                    type="text" 
                                    class="form-control form-control-lg" 
                                    id="inputUsuario" 
                                    placeholder="Digite seu usuário ou CPF"
                                    required
                                    autocomplete="username"
                                >
                                <div class="invalid-feedback">
                                    Por favor, informe seu usuário ou CPF.
                                </div>
                            </div>
                            
                            <!-- 3.2.2 Campo Senha -->
                            <div class="mb-3">
                                <label for="inputSenha" class="form-label fw-semibold">
                                    <i class="bi bi-lock-fill me-1"></i>Senha
                                </label>
                                <div class="input-group">
                                    <input 
                                        type="password" 
                                        class="form-control form-control-lg" 
                                        id="inputSenha" 
                                        placeholder="Digite sua senha"
                                        required
                                        autocomplete="current-password"
                                    >
                                    <button class="btn btn-outline-secondary" type="button" id="btnVerSenha" title="Mostrar/ocultar senha">
                                        <i class="bi bi-eye-fill"></i>
                                    </button>
                                </div>
                                <div class="invalid-feedback">
                                    Por favor, informe sua senha.
                                </div>
                            </div>
                            
                            
                            <!-- 3.2.4 Botão Entrar -->
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-success btn-lg fw-semibold" id="btnEntrar">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>ENTRAR
                                </button>
                            </div>
                            
                        </form>
                        
                        <!-- 3.3 MENSAGEM DE ERRO -->
                        <div id="msgErro" class="alert alert-danger d-none text-center small" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-1"></i>
                            <span id="textoErro"></span>
                        </div>
                        
                        <!-- 3.4 RODAPÉ DO CARD -->
                        <div class="text-center mt-3">
                            <small class="text-muted">
                                <i class="bi bi-shield-lock-fill me-1"></i>
                                Sistema exclusivo para profissionais autorizados
                            </small>
                        </div>
                        
                    </div>
                </div>
                
                <!-- 4 VERSÃO E COPYRIGHT -->
                <div class="text-center mt-3">
                    <small class="text-muted">
                        v1.0 - UNIVESP Projeto Integrador &copy; 2026
                    </small>
                </div>
                
            </div>
        </div>
    </div>

           <!-- 5 SCRIPTS -->
    <!-- 5.1 Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 5.2 App JS (Autenticação e Navegação) -->
    <script src="js/app.js"></script>

    <!-- 5.3 Toggle senha -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btnVerSenha = document.getElementById('btnVerSenha');
            const inputSenha = document.getElementById('inputSenha');
            
            if (btnVerSenha && inputSenha) {
                btnVerSenha.addEventListener('click', function() {
                    const tipo = inputSenha.getAttribute('type') === 'password' ? 'text' : 'password';
                    inputSenha.setAttribute('type', tipo);
                    const icone = btnVerSenha.querySelector('i');
                    icone.className = tipo === 'password' ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill';
                });
            }
        });
    </script>
</body>
</html>
